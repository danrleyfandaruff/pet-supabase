<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()"><ion-icon name="close-outline" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar' : 'Novo' }} Animal</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" strong="true">Salvar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [formGroup]="form" class="ion-padding">

  <!-- Nome -->
  <ion-item>
    <ion-label position="stacked">Nome <span class="obrig">*</span></ion-label>
    <ion-input formControlName="nome" placeholder="Nome do animal"></ion-input>
  </ion-item>
  <ion-note *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched" color="danger" class="campo-erro">
    Nome é obrigatório
  </ion-note>

  <!-- Data de nascimento (opcional) -->
  <ion-item>
    <ion-label position="stacked">Data de Nascimento <span class="opcional">(opcional)</span></ion-label>
    <ion-input formControlName="data_nascimento" type="date" [attr.required]="null"></ion-input>
  </ion-item>

  <!-- Tutor — seleção com busca (obrigatório) -->
  <ion-item button (click)="abrirSelecionarTutor()" detail="false"
    [class.item-invalid]="form.get('id_cliente')?.invalid && form.get('id_cliente')?.touched">
    <ion-label position="stacked">Tutor (Cliente) <span class="obrig">*</span></ion-label>
    <div class="select-value-row">
      <span class="select-text" [class.select-text--filled]="clienteSelecionadoLabel">
        {{ clienteSelecionadoLabel || 'Selecionar tutor' }}
      </span>
      <ion-icon
        *ngIf="clienteSelecionadoLabel"
        name="close-circle"
        color="medium"
        class="clear-icon"
        (click)="limparTutor($event)">
      </ion-icon>
      <ion-icon *ngIf="!clienteSelecionadoLabel" name="chevron-forward-outline" color="medium"></ion-icon>
    </div>
  </ion-item>
  <ion-note *ngIf="form.get('id_cliente')?.invalid && form.get('id_cliente')?.touched" color="danger" class="campo-erro">
    Tutor é obrigatório
  </ion-note>

  <!-- Raça — seleção com busca (opcional) -->
  <ion-item button (click)="abrirSelecionarRaca()" detail="false">
    <ion-label position="stacked">Raça <span class="opcional">(opcional)</span></ion-label>
    <div class="select-value-row">
      <span class="select-text" [class.select-text--filled]="racaSelecionadaLabel">
        {{ racaSelecionadaLabel || 'Selecionar raça' }}
      </span>
      <ion-icon
        *ngIf="racaSelecionadaLabel"
        name="close-circle"
        color="medium"
        class="clear-icon"
        (click)="limparRaca($event)">
      </ion-icon>
      <ion-icon *ngIf="!racaSelecionadaLabel" name="chevron-forward-outline" color="medium"></ion-icon>
    </div>
  </ion-item>

  <!-- Ativo -->
  <ion-item>
    <ion-label>Ativo</ion-label>
    <ion-toggle formControlName="ativo" slot="end"></ion-toggle>
  </ion-item>

</ion-content>

<style>
  .obrig {
    color: var(--ion-color-danger);
    font-weight: bold;
  }
  .opcional {
    color: var(--ion-color-medium);
    font-size: 12px;
    font-weight: normal;
  }
  .campo-erro {
    display: block;
    padding: 4px 16px;
    font-size: 12px;
  }
  .item-invalid {
    --border-color: var(--ion-color-danger);
  }
  .select-value-row {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 8px 0;
    gap: 8px;
  }
  .select-text {
    flex: 1;
    font-size: 16px;
    color: var(--ion-color-medium);
  }
  .select-text--filled {
    color: var(--ion-text-color, #000);
  }
  .clear-icon {
    font-size: 18px;
    cursor: pointer;
  }
</style>
