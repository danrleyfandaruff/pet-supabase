server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache para assets com hash no nome (Angular gera ex: main.abc123.js)
    location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html nunca fica em cache (sempre busca a versão mais nova)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — todas as rotas redirecionam para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
