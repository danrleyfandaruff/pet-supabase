<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()"><ion-icon name="close-outline" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar' : 'Novo' }} Animal</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" strong="true">Salvar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [formGroup]="form" class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Nome *</ion-label>
    <ion-input formControlName="nome" placeholder="Nome do animal"></ion-input>
  </ion-item>
  <ion-note *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched" color="danger" class="ion-padding-start">Nome obrigatório</ion-note>

  <ion-item>
    <ion-label position="stacked">Data de Nascimento</ion-label>
    <ion-input formControlName="data_nascimento" type="date"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Tutor (Cliente)</ion-label>
    <ion-select formControlName="id_cliente" placeholder="Selecionar cliente" interface="action-sheet">
      <ion-select-option *ngFor="let c of clientes" [value]="c.id">{{ c.nome }}</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Raça</ion-label>
    <ion-select formControlName="id_raca" placeholder="Selecionar raça" interface="action-sheet">
      <ion-select-option *ngFor="let r of racas" [value]="r.id">{{ r.nome }}</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Ativo</ion-label>
    <ion-toggle formControlName="ativo" slot="end"></ion-toggle>
  </ion-item>
</ion-content>
