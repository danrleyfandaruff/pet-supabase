<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()"><ion-icon name="close-outline" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar' : 'Novo' }} Pacote</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" strong="true">Salvar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [formGroup]="form" class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Nome *</ion-label>
    <ion-input formControlName="nome" placeholder="Nome do pacote"></ion-input>
  </ion-item>
  <ion-note *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched" color="danger" class="ion-padding-start">Nome obrigatório</ion-note>

  <ion-item>
    <ion-label position="stacked">Desconto (%)</ion-label>
    <ion-input formControlName="desconto" type="number" placeholder="0"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Quantidade de atendimentos</ion-label>
    <ion-input formControlName="quantidade" type="number" placeholder="Ex: 10"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Recorrência (dias)</ion-label>
    <ion-input formControlName="recorrencia" type="number" placeholder="Ex: 30"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label>Ativo</ion-label>
    <ion-toggle formControlName="ativo" slot="end"></ion-toggle>
  </ion-item>
</ion-content>
