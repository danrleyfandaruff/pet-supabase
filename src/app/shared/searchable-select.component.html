<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      [(ngModel)]="searchTerm"
      placeholder="Buscar..."
      [debounce]="150"
      class="searchable-searchbar">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list lines="full">
    <ion-item
      button
      *ngFor="let item of filtered"
      (click)="select(item)"
      detail="false">
      <ion-label>{{ item.label }}</ion-label>
    </ion-item>
    <ion-item *ngIf="filtered.length === 0">
      <ion-label color="medium" class="ion-text-center">Nenhum resultado para "{{ searchTerm }}"</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
