<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()"><ion-icon name="close-outline" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar' : 'Novo' }} Serviço</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" strong="true">Salvar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [formGroup]="form" class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Nome *</ion-label>
    <ion-input formControlName="nome" placeholder="Nome do serviço"></ion-input>
  </ion-item>
  <ion-note *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched" color="danger" class="ion-padding-start">Nome obrigatório</ion-note>

  <ion-item>
    <ion-label position="stacked">Valor (R$)</ion-label>
    <ion-input formControlName="valor" type="number" placeholder="0,00"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Tipo de Serviço</ion-label>
    <ion-select formControlName="id_tipo_servico" placeholder="Selecionar tipo" interface="action-sheet">
      <ion-select-option *ngFor="let t of tipos" [value]="t.id">{{ t.nome }}</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Ativo</ion-label>
    <ion-toggle formControlName="ativo" slot="end"></ion-toggle>
  </ion-item>
</ion-content>
