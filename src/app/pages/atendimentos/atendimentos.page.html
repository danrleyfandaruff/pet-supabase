<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/inicio" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Agenda</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary" class="search-toolbar">
    <ion-searchbar
      placeholder="Buscar por pet, tutor ou data"
      (ionInput)="onSearch($event)"
      debounce="300"
      class="custom-searchbar">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="list-content">
  <ion-refresher slot="fixed" (ionRefresh)="loadData(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div *ngIf="isLoading" class="loading-container">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
  </div>

  <div class="list-wrapper" *ngIf="!isLoading">
    <div *ngFor="let a of atendimentosFiltrados" class="card-item">
      <div class="card-main" (click)="openForm(a)">
        <div class="item-icon-wrap color-primary">
          <ion-icon name="calendar"></ion-icon>
        </div>
        <div class="card-text">
          <h2>{{ a.animal?.nome || a.cliente?.nome || 'Sem pet/tutor' }}</h2>
          <p>{{ formatDate(a.data) }}
            <span *ngIf="a.responsavel?.nome"> · {{ a.responsavel?.nome }}</span>
          </p>
          <p *ngIf="a.servico?.nome" class="servico-label">
            <ion-icon name="cut-outline"></ion-icon> {{ a.servico?.nome }}
            <span *ngIf="a.servico?.valor"> — R$ {{ a.servico?.valor | number:'1.2-2' }}</span>
          </p>
          <p *ngIf="a.pacote?.nome" class="pacote-label">
            <ion-icon name="gift-outline"></ion-icon> {{ a.pacote?.nome }}
          </p>
        </div>
        <ion-badge
          *ngIf="a.status_info?.nome"
          class="status-badge"
          [ngClass]="getBadgeClass(a.status_info?.nome)">
          {{ a.status_info?.nome }}
        </ion-badge>
      </div>
      <div class="card-actions">
        <ion-button fill="clear" color="primary" (click)="openForm(a)">
          <ion-icon slot="icon-only" name="create-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" color="danger" (click)="confirmDelete(a)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && atendimentosFiltrados.length === 0" class="empty-state">
    <div class="empty-icon"><ion-icon name="calendar-outline"></ion-icon></div>
    <h3>Nenhum atendimento</h3>
    <p>Toque em + para agendar</p>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openForm()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
